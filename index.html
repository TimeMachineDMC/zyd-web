<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justitia | 法财穿透研判引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">

    <style>
        :root {
            --bg-dark: #09090b;
            --accent-amber: #f59e0b;
            --glass-zinc: rgba(24, 24, 27, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            color: #f4f4f5;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
        }

        /* 通过大的 pb-64 确保内容永远浮在输入框上方 */
        .chat-container { 
            height: calc(100vh - 80px); 
            overflow-y: auto;
            padding-bottom: 260px !important; 
        }

        /* --- Markdown 极致渲染优化 --- */
        .markdown-body {
            background-color: transparent !important;
            font-size: 15px !important;
            line-height: 1.8;
            color: #d4d4d8 !important;
        }
        .markdown-body strong { color: var(--accent-amber); font-weight: 800; }
        .markdown-body blockquote {
            border-left: 3px solid var(--accent-amber);
            background: rgba(245, 158, 11, 0.05);
            padding: 10px 20px;
            color: #a1a1aa;
            border-radius: 4px;
        }
        /* 针对财务数据优化的精美表格 */
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
        .markdown-body th, .markdown-body td { border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 14px; text-align: left; }
        .markdown-body th { background: rgba(245, 158, 11, 0.1); color: var(--accent-amber); font-weight: bold; border-bottom: 2px solid var(--accent-amber); }
        .markdown-body tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }

        /* --- 气泡呼吸感增强 --- */
        .bubble-ai {
            background: var(--glass-zinc);
            border: 1px solid rgba(245, 158, 11, 0.1);
            position: relative;
            /* 增加圣洁的外发光和更大的呼吸间距 */
            box-shadow: 0 4px 30px rgba(245, 158, 11, 0.04);
            padding: 1.5rem !important; 
        }
        .bubble-ai::before {
            content: "";
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 2px;
            background: var(--accent-amber);
            box-shadow: 0 0 10px var(--accent-amber);
        }
        .bubble-user {
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            padding: 1rem 1.25rem !important; /* 平衡用户气泡 */
        }

        /* --- Thought 面板动态样式 --- */
        .reasoning-panel {
            background: rgba(39, 39, 42, 0.4);
            border-left: 2px dashed #3f3f46;
            margin: 12px 0;
            padding: 12px 16px;
            font-size: 13px;
            color: #71717a;
            border-radius: 0 8px 8px 0;
            transition: border-color 0.3s ease;
        }

        /* --- 输入框流光反馈 --- */
        .glow-generating {
            animation: borderPulse 2s infinite ease-in-out;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
            50% { border-color: rgba(245, 158, 11, 0.6); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        }

        #user-input::-webkit-scrollbar { width: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>

<body class="antialiased font-sans">

    <header class="border-b border-white/5 p-4 bg-black/20 backdrop-blur-xl sticky top-0 z-30">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="text-amber-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m5 8 7-5 7 5"/><path d="M3 10h18"/><path d="M21 21H3"/><path d="M12 12H3"/><path d="M12 12h9"/></svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-[0.2em] text-white uppercase">Justitia</h1>
                    <p class="text-[9px] text-zinc-600 tracking-widest uppercase mt-0.5">Law & Finance Intelligence Engine</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2.5 bg-zinc-900/60 px-4 py-2 rounded-full border border-white/5 shadow-inner">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500 shadow-[0_0_8px_#f59e0b]"></span>
                </span>
                <span class="text-[10px] text-amber-500/90 font-mono font-bold tracking-widest uppercase">System Online</span>
            </div>
        </div>
    </header>

    <main id="chat-box" class="max-w-4xl mx-auto p-6 chat-container space-y-10">
        <div class="flex justify-start">
            <div class="bubble-ai rounded-r-xl max-w-[90%] shadow-2xl">
                <p class="text-amber-500 font-bold mb-3 tracking-tighter text-xs">JUSTITIA CORE 1.0</p>
                <div class="text-zinc-300 text-sm leading-relaxed">
                    尊敬的用户，Justitia 研判系统已就绪。
                    <br><br>
                    <span class="text-zinc-500 italic">“我穿越森林灯红酒绿。”</span>
                </div>

                <div class="mt-6 border-t border-white/5 pt-4">
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-3">快捷研判指令 / Quick Commands</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div onclick="fillAndSend('帮我查阅最新的股东出资加速到期相关案例，并总结法院判定标准。')" class="p-3 bg-zinc-900/50 border border-zinc-800 rounded-lg hover:border-amber-500/40 hover:bg-amber-500/5 cursor-pointer transition-all group">
                            <h4 class="text-amber-500 text-xs font-bold mb-1">⚖️ 法理案卷溯源</h4>
                            <p class="text-[11px] text-zinc-400 group-hover:text-zinc-300 transition-colors">检索“股东出资加速到期”判例标准</p>
                        </div>
                        <div onclick="fillAndSend('分析股票代码 Scode 为 000001 的公司的财务报表，提取其核心营收和负债数据，判断是否存在异常流出风险。')" class="p-3 bg-zinc-900/50 border border-zinc-800 rounded-lg hover:border-amber-500/40 hover:bg-amber-500/5 cursor-pointer transition-all group">
                            <h4 class="text-amber-500 text-xs font-bold mb-1">📊 财务数据穿透</h4>
                            <p class="text-[11px] text-zinc-400 group-hover:text-zinc-300 transition-colors">核查某企业资产负债表与异常流出</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="fixed bottom-8 w-full bg-transparent z-40">
        <div class="max-w-4xl mx-auto px-6">
            <div id="file-list" class="flex flex-wrap gap-2 mb-4"></div>

            <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-amber-500/20 to-purple-500/20 rounded-2xl blur opacity-30 group-focus-within:opacity-100 transition duration-1000"></div>
                
                <div id="input-wrapper" class="relative bg-zinc-900/90 border border-white/10 rounded-2xl p-3 shadow-2xl backdrop-blur-xl transition-all duration-300">
                    <div class="flex items-end gap-2">
                        <button id="upload-trigger" class="p-3 text-zinc-500 hover:text-amber-500 transition-all transform hover:scale-110">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <input type="file" id="file-input" class="hidden" accept=".pdf,.docx,.txt" multiple>
                        <textarea id="user-input" rows="1" placeholder="输入指令，Shift + Enter 换行" class="flex-1 bg-transparent border-none text-zinc-200 placeholder-zinc-600 text-sm py-3 focus:outline-none resize-none max-h-48 overflow-y-auto"></textarea>
                        <button id="send-btn" class="bg-amber-500 hover:bg-amber-400 text-black p-3 rounded-xl transition-all active:scale-90 disabled:opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-[10px] text-center text-zinc-600 mt-4 tracking-wide font-medium">
                Justitia 是一位 AI 助手，其回答未必正确无误。
            </p>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const uploadTrigger = document.getElementById('upload-trigger');
        const fileListContainer = document.getElementById('file-list');
        const inputWrapper = document.getElementById('input-wrapper');

        const API_URL = "https://4ce7f5fb.r39.cpolar.top/api/chat";
        const UPLOAD_URL = "https://4ce7f5fb.r39.cpolar.top/api/upload";

        let attachedFiles = [];
        let isGenerating = false; // 防重复提交锁
        let chatHistory = [];

        // --- 💡 快捷发送卡片支持 ---
        window.fillAndSend = function(text) {
            userInput.value = text;
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            handleSend();
        };

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleSend();
        });

        uploadTrigger.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                if (attachedFiles.some(f => f.name === file.name)) continue;
                const tag = createTag(file.name, true);
                fileListContainer.appendChild(tag);
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const response = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.full_content) { 
                        attachedFiles.push({ name: file.name, content: data.full_content }); 
                        renderTags(); 
                    } else tag.remove();
                } catch (err) { tag.remove(); }
            }
            fileInput.value = "";
        };

        function createTag(name, isLoading = false) {
            const div = document.createElement('div');
            div.className = `px-3 py-1.5 rounded-lg text-[10px] font-bold tracking-tighter ${isLoading ? 'bg-zinc-800 text-zinc-600 animate-pulse' : 'bg-amber-500/10 border border-amber-500/20 text-amber-500'}`;
            div.innerHTML = isLoading ? `PENDING: ${name}` : `ATTACHED: ${name}`;
            if (!isLoading) {
                const btn = document.createElement('button');
                btn.className = "ml-2 hover:text-white"; btn.innerHTML = "×";
                btn.onclick = () => { attachedFiles = attachedFiles.filter(f => f.name !== name); renderTags(); };
                div.appendChild(btn);
            }
            return div;
        }

        function renderTags() { fileListContainer.innerHTML = ""; attachedFiles.forEach(f => fileListContainer.appendChild(createTag(f.name))); }

        async function appendMessage(role, text, type = 'content') {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2 duration-300 w-full`;

            const div = document.createElement('div');
            
            // --- 💡 Thought 面板动态收起逻辑 ---
            if (type === 'reasoning') {
                div.className = "reasoning-panel max-w-[85%] group cursor-pointer hover:bg-zinc-800/60 transition-colors";
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-1 select-none">
                        <span class="text-amber-500 font-bold mr-2">⚖️ JUSTITIA'S THOUGHT</span>
                        <span class="text-[10px] text-zinc-500 opacity-0 group-hover:opacity-100 transition-opacity">点击折叠 / 展开</span>
                    </div>
                    <div class="thought-content text-zinc-400 leading-relaxed overflow-hidden">${text}</div>
                `;
                div.onclick = function() {
                    const content = this.querySelector('.thought-content');
                    content.style.display = content.style.display === 'none' ? 'block' : 'none';
                };
            } else {
                div.className = role === 'user' ? "bubble-user rounded-2xl rounded-tr-none p-4 max-w-[85%] text-sm text-zinc-100" : "bubble-ai rounded-r-xl p-6 max-w-[90%] text-sm markdown-body";
                if (role === 'user') div.innerText = text;
                else div.innerHTML = marked.parse(text);
            }

            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function handleSend() {
            if (isGenerating) return; // 拦截重复点击

            const rawInput = userInput.value.trim();
            if (!rawInput && attachedFiles.length === 0) return;

            // 💡 锁定发送键，开启流光特效
            isGenerating = true;
            sendBtn.style.opacity = '0.5';
            inputWrapper.classList.add('glow-generating');

            let finalPrompt = rawInput;
            if (attachedFiles.length > 0) {
                const context = attachedFiles.map(f => `【${f.name}】\n${f.content}`).join("\n\n");
                finalPrompt = `[Context]\n${context}\n\n[Task]\n${rawInput || "法律财务风险评估"}`;
            }

            await appendMessage('user', rawInput || `已提交附件供分析`);
            userInput.value = ''; 
            userInput.style.height = 'auto';

            const reasoningDiv = await appendMessage('ai', 'Justitia 正在解析逻辑链...', 'reasoning');
            const aiMsgDiv = await appendMessage('ai', '...');
            
            let fullReasoning = "";
            let fullContent = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: finalPrompt, 
                        history: chatHistory,
                        stream: true 
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiMsgDiv.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') { 
                                const userText = String(rawInput).trim();
                                const aiText = String(fullContent).trim();
                                
                                if (userText && aiText) {
                                    chatHistory.push({ "role": "user", "content": userText });
                                    chatHistory.push({ "role": "assistant", "content": aiText });
                                }

                                if (chatHistory.length > 10) {
                                    chatHistory = chatHistory.slice(-10);
                                }
                                
                                reasoningDiv.style.borderLeftStyle = "solid"; 
                                reasoningDiv.style.borderLeftColor = "#10b981"; 
                                const contentNode = reasoningDiv.querySelector('.thought-content');
                                if(contentNode) contentNode.style.display = 'none';
                                break; 
                            }
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'reasoning' && reasoningDiv) {
                                    fullReasoning += data.content;
                                    const contentNode = reasoningDiv.querySelector('.thought-content');
                                    if(contentNode) contentNode.innerText = fullReasoning;
                                } else if (data.type === 'chunk') {
                                    fullContent += data.content;
                                    aiMsgDiv.innerHTML = marked.parse(fullContent);
                                }
                                chatBox.scrollTop = chatBox.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) { 
                aiMsgDiv.innerText = "Connection Error"; 
            } finally {
                isGenerating = false;
                sendBtn.style.opacity = '1';
                inputWrapper.classList.remove('glow-generating');
            }
        }
    </script>
</body>

</html>
