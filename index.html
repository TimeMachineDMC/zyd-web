<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法财 ZYD 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">

    <style>
        :root {
            --law-blue: #1e293b;
            /* 黛青色 */
            --accent-blue: #3b82f6;
        }

        body {
            background: radial-gradient(circle at top right, #0f172a, #020617);
        }

        .chat-container {
            height: calc(100vh - 200px);
        }

        .markdown-body {
            background-color: transparent !important;
            font-size: 14.5px !important;
            color: #e2e8f0 !important;
            line-height: 1.7;
        }

        /* 典雅的对话气泡 */
        .bubble-ai {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .bubble-user {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        /* 附件标签动画 */
        .file-tag {
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="text-gray-200 font-sans antialiased">

    <header class="border-b border-slate-800/60 p-4 bg-slate-900/40 backdrop-blur-md sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white shadow-lg">
                    ZYD</div>
                <h1 class="text-lg font-semibold tracking-wide text-slate-100">法财专家助手</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-xs text-slate-400 font-mono">DeepSeek-V3.2 Engine</span>
            </div>
        </div>
    </header>

    <main id="chat-box" class="max-w-4xl mx-auto p-4 chat-container overflow-y-auto space-y-8">
        <div class="flex justify-start">
            <div class="bubble-ai rounded-2xl rounded-tl-none p-4 max-w-[85%] text-sm leading-relaxed text-slate-300">
                <p class="font-semibold mb-1 text-blue-400">系统就绪</p>
                尊敬的用户，我是您的专业法务与财务AI顾问。您现在可以点击下方的 📎 按钮上传 PDF 或 Word 文档让我分析。
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-slate-950/80 backdrop-blur-xl p-4 border-t border-slate-800/50">
        <div class="max-w-4xl mx-auto">

            <div id="file-list" class="flex flex-wrap gap-2 mb-3"></div>

            <div class="flex items-end gap-3">
                <div class="flex-1 flex flex-col gap-2">
                    <input type="file" id="file-input" class="hidden" accept=".pdf,.docx,.txt" multiple>

                    <div
                        class="flex gap-2 bg-slate-900/80 border border-slate-700/50 rounded-xl px-4 py-1.5 focus-within:border-blue-500/50 transition-all shadow-inner">
                        <button id="upload-trigger" title="上传附件"
                            class="text-slate-400 hover:text-blue-400 transition-colors text-xl">
                            📎
                        </button>
                        <input id="user-input" type="text" placeholder="请在此描述您的法律或财务咨询需求..."
                            class="flex-1 bg-transparent border-none text-slate-200 placeholder-slate-500 text-sm py-2 focus:outline-none">
                    </div>
                </div>

                <button id="send-btn"
                    class="bubble-user px-6 py-3 rounded-xl font-medium text-sm text-white transition hover:brightness-110 active:scale-95 mb-0.5">
                    提交咨询
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-600 mt-3 tracking-widest">基于 RAG 检索增强技术 · 法律意见仅供参考</p>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const uploadTrigger = document.getElementById('upload-trigger');
        const fileListContainer = document.getElementById('file-list');

        const API_URL = "https://75c0f213.r39.cpolar.top/api/chat";
        const UPLOAD_URL = "https://75c0f213.r39.cpolar.top/api/upload";

        let attachedFiles = []; // 格式: [{name: 'filename', content: 'text'}]

        // --- 附件逻辑 ---
        uploadTrigger.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                if (attachedFiles.some(f => f.name === file.name)) continue;

                const tag = createTag(file.name, true);
                fileListContainer.appendChild(tag);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.full_content) {
                        attachedFiles.push({ name: file.name, content: data.full_content });
                        renderTags();
                    } else {
                        tag.remove();
                        alert(`解析失败: ${file.name}`);
                    }
                } catch (err) {
                    tag.remove();
                    alert("网络异常，无法连接后端接口。");
                }
            }
            fileInput.value = "";
        };

        function createTag(name, isLoading = false) {
            const div = document.createElement('div');
            div.className = `file-tag flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs border ${isLoading ? 'bg-slate-800 border-slate-700 text-slate-500 animate-pulse' : 'bg-cyan-900/30 border-cyan-500/40 text-cyan-200'
                }`;
            div.innerHTML = `<span>${isLoading ? '⏳' : '📜'} ${name}</span>`;
            if (!isLoading) {
                const btn = document.createElement('button');
                btn.className = "ml-1 text-cyan-500 hover:text-red-400 transition-colors";
                btn.innerHTML = "✕";
                btn.onclick = () => {
                    attachedFiles = attachedFiles.filter(f => f.name !== name);
                    renderTags();
                };
                div.appendChild(btn);
            }
            return div;
        }

        function renderTags() {
            fileListContainer.innerHTML = "";
            attachedFiles.forEach(f => fileListContainer.appendChild(createTag(f.name)));
        }

        // --- 对话逻辑 ---
        async function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const div = document.createElement('div');
            div.className = role === 'user'
                ? "bubble-user rounded-2xl rounded-tr-none p-4 max-w-[85%] text-sm text-white"
                : "bubble-ai rounded-2xl rounded-tl-none p-4 max-w-[85%] text-sm markdown-body";

            if (role === 'user') {
                div.innerText = text;
            } else {
                div.innerHTML = marked.parse(text);
            }

            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function handleSend() {
            const rawInput = userInput.value.trim();
            if (!rawInput && attachedFiles.length === 0) return;

            // 合并所有附件内容
            let finalPrompt = rawInput;
            if (attachedFiles.length > 0) {
                const context = attachedFiles.map(f => `【文件名：${f.name}】\n${f.content}`).join("\n\n");
                finalPrompt = `参考以下附件材料：\n\n${context}\n\n我的咨询问题是：${rawInput || "请对以上材料进行法务及财务风险总结。"}`;
            }

            await appendMessage('user', rawInput || `已提交 ${attachedFiles.length} 份附件供分析`);
            userInput.value = '';

            const aiMsgDiv = await appendMessage('ai', '正在查阅卷宗，请稍候...');
            let fullContent = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: finalPrompt, stream: true })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiMsgDiv.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'chunk') {
                                    fullContent += data.content;
                                    aiMsgDiv.innerHTML = marked.parse(fullContent);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) { }
                        }
                    }
                }
                // 根据需求：可选在此处 reset 附件。为了连贯性，这里暂时保留标签以便用户追问。
            } catch (err) {
                aiMsgDiv.innerText = "咨询中断: " + err.message;
                aiMsgDiv.classList.add('text-red-400');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>

</html>
