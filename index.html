<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>债优盾 | ZYD 法财一体化引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">

    <style>
        :root {
            --bg-dark: #09090b; /* Zinc-950 */
            --accent-gold: #f59e0b; /* Amber-500 */
        }

        body {
            background-color: var(--bg-dark);
            color: #f4f4f5;
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .markdown-body {
            background-color: transparent !important;
            font-size: 15px !important;
            line-height: 1.8;
            color: #d4d4d8 !important;
        }

        /* 极致简约的气泡设计 */
        .bubble-ai {
            background: rgba(24, 24, 27, 0.8); /* Zinc-900 */
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent-gold);
        }

        .bubble-user {
            background: #27272a; /* Zinc-800 */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 隐藏 textarea 滚动条但保留功能 */
        #user-input::-webkit-scrollbar { width: 0; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .file-tag {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--accent-gold);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="antialiased font-sans">

    <header class="border-b border-zinc-800/50 p-4 bg-zinc-950/50 backdrop-blur-xl sticky top-0 z-20">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 border-2 border-amber-500 rounded-full flex items-center justify-center">
                    <div class="w-2 h-2 bg-amber-500 rounded-full"></div>
                </div>
                <h1 class="text-sm font-bold tracking-widest text-zinc-100">ZYD 债优盾 <span class="text-zinc-500 font-normal">| 法财研判引擎</span></h1>
            </div>
            <div class="text-[10px] text-zinc-500 font-mono flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span> SYSTEM ONLINE
            </div>
        </div>
    </header>

    <main id="chat-box" class="max-w-4xl mx-auto p-6 chat-container overflow-y-auto space-y-8">
        <div class="flex justify-start">
            <div class="bubble-ai rounded-xl p-5 max-w-[90%] text-sm shadow-2xl">
                <p class="text-amber-500 font-bold mb-2 uppercase tracking-tighter text-xs">A.I. Consultant Initialized</p>
                尊敬的专家，法财分析系统已就绪。请上传相关案卷或输入查询指令，我将基于本地知识库为您提供精准研判。
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full p-4">
        <div class="max-w-4xl mx-auto">
            
            <div id="file-list" class="flex flex-wrap gap-2 mb-3"></div>

            <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl p-2 shadow-2xl transition-all focus-within:border-zinc-700">
                <div class="flex items-end gap-2">
                    <button id="upload-trigger" title="上传附件"
                        class="p-3 text-zinc-500 hover:text-amber-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    
                    <input type="file" id="file-input" class="hidden" accept=".pdf,.docx,.txt" multiple>
                    
                    <textarea id="user-input" rows="1" 
                        placeholder="输入指令，Shift + Enter 换行..."
                        class="flex-1 bg-transparent border-none text-zinc-200 placeholder-zinc-600 text-sm py-3 focus:outline-none resize-none max-h-48 overflow-y-auto"></textarea>
                    
                    <button id="send-btn"
                        class="bg-amber-500 hover:bg-amber-600 text-zinc-950 p-3 rounded-xl transition-all active:scale-95 disabled:opacity-50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    </button>
                </div>
            </div>
            <p class="text-[9px] text-center text-zinc-600 mt-3 uppercase tracking-[0.2em]">End-to-End Encrypted | RAG-Augmented Evidence</p>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const uploadTrigger = document.getElementById('upload-trigger');
        const fileListContainer = document.getElementById('file-list');

        const API_URL = "https://4ce7f5fb.r39.cpolar.top/api/chat";
        const UPLOAD_URL = "https://4ce7f5fb.r39.cpolar.top/api/upload";

        let attachedFiles = [];

        // --- 交互优化：自动高度与换行逻辑 ---
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // --- 附件逻辑 ---
        uploadTrigger.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                if (attachedFiles.some(f => f.name === file.name)) continue;
                const tag = createTag(file.name, true);
                fileListContainer.appendChild(tag);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.full_content) {
                        attachedFiles.push({ name: file.name, content: data.full_content });
                        renderTags();
                    } else {
                        tag.remove();
                    }
                } catch (err) { tag.remove(); }
            }
            fileInput.value = "";
        };

        function createTag(name, isLoading = false) {
            const div = document.createElement('div');
            div.className = `file-tag flex items-center gap-2 px-3 py-1.5 rounded-lg text-[11px] font-medium`;
            div.innerHTML = `<span>${isLoading ? '...' : 'DOC'} ${name}</span>`;
            if (!isLoading) {
                const btn = document.createElement('button');
                btn.className = "ml-1 hover:text-white transition-colors";
                btn.innerHTML = "✕";
                btn.onclick = () => {
                    attachedFiles = attachedFiles.filter(f => f.name !== name);
                    renderTags();
                };
                div.appendChild(btn);
            }
            return div;
        }

        function renderTags() {
            fileListContainer.innerHTML = "";
            attachedFiles.forEach(f => fileListContainer.appendChild(createTag(f.name)));
        }

        // --- 对话逻辑 ---
        async function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;

            const div = document.createElement('div');
            div.className = role === 'user'
                ? "bubble-user rounded-2xl rounded-tr-none p-4 max-w-[85%] text-sm text-zinc-100"
                : "bubble-ai rounded-xl p-5 max-w-[90%] text-sm markdown-body shadow-xl";

            if (role === 'user') {
                div.innerText = text;
            } else {
                div.innerHTML = marked.parse(text);
            }

            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function handleSend() {
            const rawInput = userInput.value.trim();
            if (!rawInput && attachedFiles.length === 0) return;

            let finalPrompt = rawInput;
            if (attachedFiles.length > 0) {
                const context = attachedFiles.map(f => `【文件名：${f.name}】\n${f.content}`).join("\n\n");
                finalPrompt = `参考附件材料：\n\n${context}\n\n问题：${rawInput || "请对以上材料进行风险总结。"}`;
            }

            await appendMessage('user', rawInput || `正在分析 ${attachedFiles.length} 份文档...`);
            userInput.value = '';
            userInput.style.height = 'auto'; // 重置高度

            const aiMsgDiv = await appendMessage('ai', 'Thinking...');
            let fullContent = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: finalPrompt, stream: true })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiMsgDiv.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'chunk') {
                                    fullContent += data.content;
                                    aiMsgDiv.innerHTML = marked.parse(fullContent);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) { }
                        }
                    }
                }
            } catch (err) {
                aiMsgDiv.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>

</html>
